apiVersion: apps/v1
kind: Deployment
metadata:
  name: kmeans-backend
  labels:
    app: kmeans-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kmeans-backend
  template:
    metadata:
      labels:
        app: kmeans-backend
    spec:
      containers:
        - name: kmeans-backend
          image: kmeans-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5